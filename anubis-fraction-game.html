<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아누비스의 재판: 진실의 저울</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
:root{
  --papyrus:#f4e4bc;--ink:#1a1410;--gold:#c9a961;--teal:#2c5f7a;
  --terra:#a0432a;--bone:#efe2c2;--gold-deep:#8b6d38;--terra-deep:#6e2d18;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--ink);height:100%;overflow:hidden;
  color:var(--papyrus);
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* SVG part classes */
svg .gold{fill:var(--gold)} svg .gold-deep{fill:var(--gold-deep)}
svg .terra{fill:var(--terra)} svg .terra-deep{fill:var(--terra-deep)}
svg .ink{fill:var(--ink)} svg .bone{fill:var(--bone)} svg .teal{fill:var(--teal)}
svg .stroke{stroke:var(--ink);stroke-width:4;fill:none}
svg .stroke-thin{stroke:var(--ink);stroke-width:2.5;fill:none}
svg .label-bg{fill:var(--papyrus)}
svg .label-text{
  font-family:'Noto Sans KR',sans-serif;font-size:22px;font-weight:900;
  fill:var(--ink);text-anchor:middle;dominant-baseline:central;
}
svg .heart-filled{fill:var(--terra);transition:fill .3s}
svg .heart-empty{fill:var(--terra-deep);opacity:.35;transition:fill .3s,opacity .3s}

/* ====== LAYOUT ====== */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

.top-bar{
  background:linear-gradient(90deg,#2c1e12,#3d2b1f,#2c1e12);
  padding:4px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--gold);flex-shrink:0;min-height:36px;
  flex-wrap:wrap;gap:4px;
}
.top-bar h1{font-size:clamp(.8rem,2vw,1.05rem);color:var(--gold);letter-spacing:1px;white-space:nowrap}
.hud{display:flex;gap:clamp(6px,2vw,14px);align-items:center;flex-wrap:wrap}
.hud-item{font-size:clamp(.6rem,1.4vw,.75rem);display:flex;align-items:center;gap:3px}
.hud-item strong{color:var(--gold)}

/* ====== START SCREEN ====== */
#start-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;gap:10px;padding:16px;
  background:radial-gradient(ellipse at center,#2c1e12 0%,var(--ink) 70%);
}
#start-screen .start-anubis{width:min(180px,30vw);height:auto;filter:drop-shadow(0 0 30px rgba(201,169,97,.4))}
#start-screen h2{font-size:clamp(1.1rem,3vw,1.5rem);color:var(--gold)}
#start-screen p{font-size:clamp(.7rem,1.6vw,.85rem);color:#b8a070;max-width:500px;line-height:1.7}
.start-btn{
  margin-top:6px;padding:11px 36px;font-size:clamp(.9rem,2.5vw,1.1rem);
  font-weight:900;font-family:inherit;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#fff;
  border:3px solid var(--gold);border-radius:14px;cursor:pointer;
  letter-spacing:2px;transition:all .2s;text-shadow:1px 1px 3px rgba(0,0,0,.5);
}
.start-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(201,169,97,.6)}

/* ====== GAME SCREEN ====== */
#game-screen{display:none;flex:1;overflow:hidden}
.game-layout{display:flex;width:100%;height:100%;overflow:hidden}

/* -- LEFT PANEL (scene) -- */
.left-panel{
  flex:1 1 65%;display:flex;flex-direction:column;
  padding:4px 6px;min-width:0;overflow:hidden;
  background:radial-gradient(ellipse at 50% 70%,#2c1e12,var(--ink));
}
.soul-card{
  background:linear-gradient(135deg,#2c1e12,#3d2b1f);
  border:2px solid var(--gold-deep);border-radius:8px;
  padding:6px 10px;flex-shrink:0;display:flex;gap:8px;align-items:center;
}
.soul-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#5a3e2b,var(--gold-deep));
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;border:2px solid var(--gold);
}
.soul-info{flex:1;min-width:0}
.soul-name{font-size:clamp(.75rem,1.6vw,.9rem);font-weight:900;color:var(--gold)}
.soul-record{font-size:clamp(.55rem,1.2vw,.7rem);color:#ccc;margin-top:1px;line-height:1.3}
.soul-verdict{display:inline-block;padding:1px 8px;border-radius:20px;font-size:.6rem;font-weight:700;margin-top:2px}
.verdict-good{background:#2e7d32;color:#fff}
.verdict-evil{background:#b71c1c;color:#fff}

.scene-area{flex:1;position:relative;min-height:0;display:flex;align-items:center;justify-content:center}
.scene-svg{width:100%;height:100%;max-height:100%}

/* Heart fraction overlay */
.heart-frac-overlay{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  background:rgba(26,20,16,.88);border:2px solid var(--gold);border-radius:8px;
  padding:4px 14px;text-align:center;z-index:10;
}
.hfo-label{font-size:.55rem;color:var(--gold);letter-spacing:1px}
.hfo-frac{display:flex;flex-direction:column;align-items:center;gap:1px}
.hfo-frac .n,.hfo-frac .d{font-size:clamp(1rem,2.5vw,1.5rem);font-weight:900;color:#e74c3c}
.hfo-frac .bar{width:36px;height:2px;background:#e74c3c;border-radius:2px}

/* -- RIGHT PANEL -- */
.right-panel{
  width:clamp(220px,28vw,320px);flex-shrink:0;
  background:linear-gradient(180deg,#2c1e12,var(--ink));
  border-left:3px solid var(--gold-deep);
  display:flex;flex-direction:column;padding:6px 8px;gap:4px;
  overflow-y:auto;overflow-x:hidden;
}
.instruction{
  text-align:center;padding:5px 6px;border-radius:8px;
  background:linear-gradient(135deg,#3d2b1f,#2c1e12);border:1px solid var(--gold-deep);
}
.instruction .title{font-size:clamp(.7rem,1.5vw,.85rem);font-weight:700;color:var(--gold)}
.instruction .desc{font-size:clamp(.55rem,1.1vw,.68rem);color:#b8a070;margin-top:1px}

.timer-track{height:5px;background:rgba(61,43,31,.6);border-radius:3px;overflow:hidden;flex-shrink:0}
.timer-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e74c3c);border-radius:3px;transition:width .3s linear}

/* Feather choices — horizontal compact grid */
.choices{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:4px;flex:1;align-content:center;
}
.choice-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:4px 2px;border-radius:10px;cursor:pointer;
  border:2px solid #5a3e2b;background:rgba(61,43,31,.3);
  transition:all .2s;font-family:inherit;color:var(--papyrus);
  aspect-ratio:1/1.05;min-height:0;position:relative;
}
.choice-btn:hover{border-color:var(--gold);background:rgba(201,169,97,.12)}
.choice-btn:active{transform:scale(.95)}
.choice-btn.selected{border-color:var(--gold);background:rgba(201,169,97,.22);box-shadow:0 0 10px rgba(201,169,97,.3)}
.choice-btn.correct{border-color:#66bb6a;background:rgba(46,125,50,.3)}
.choice-btn.wrong{border-color:#ef5350;background:rgba(183,28,28,.3)}
.choice-btn:disabled{cursor:default;opacity:.7}
.choice-btn.flying{
  position:fixed!important;z-index:200;pointer-events:none;
  transition:all .7s cubic-bezier(.25,.46,.45,.94);
}

.choice-feather-svg{width:28px;height:40px;flex-shrink:0}
.choice-frac-col{display:flex;flex-direction:column;align-items:center}
.choice-frac-col .cf-num,.choice-frac-col .cf-den{font-size:clamp(.7rem,1.5vw,1rem);font-weight:900;line-height:1.1}
.choice-frac-col .cf-bar{width:22px;height:2px;background:var(--papyrus);border-radius:2px}

.confirm-btn{
  width:100%;padding:9px;border-radius:10px;cursor:pointer;
  font-size:clamp(.8rem,1.8vw,.95rem);font-weight:900;font-family:inherit;
  border:3px solid;transition:all .2s;flex-shrink:0;
  text-shadow:1px 1px 2px rgba(0,0,0,.4);
}
.confirm-btn:hover{transform:scale(1.03)}
.confirm-btn:disabled{opacity:.35;cursor:default;transform:none}
.btn-place{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#fff;border-color:var(--gold)}

.msg-area{flex-shrink:0;min-height:40px;display:flex;align-items:center}
.msg-box{
  width:100%;padding:6px 10px;border-radius:8px;
  font-size:clamp(.6rem,1.2vw,.73rem);font-weight:700;
  text-align:center;line-height:1.4;animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.m-info{background:rgba(61,43,31,.8);color:var(--gold);border:1px solid var(--gold-deep)}
.m-success{background:rgba(27,94,32,.8);color:#a5d6a7;border:1px solid #66bb6a}
.m-fail{background:rgba(183,28,28,.8);color:#ffcdd2;border:1px solid #ef5350}

/* Result overlay */
.result-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82)}
.result-overlay.show{display:flex}
.result-card{text-align:center;padding:24px 32px;border-radius:16px;animation:popIn .5s ease;max-width:90vw}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.result-heaven{background:linear-gradient(135deg,#1b5e20,#2e7d32);border:3px solid #66bb6a}
.result-devour{background:linear-gradient(135deg,#b71c1c,#880e4f);border:3px solid #ef5350}
.result-wrong{background:linear-gradient(135deg,#4a148c,#6a1b9a);border:3px solid #ce93d8}
.result-icon{font-size:2.5rem;margin-bottom:6px}
.result-title{font-size:1.1rem;font-weight:900;margin-bottom:4px}
.result-desc{font-size:.8rem;color:#ddd;line-height:1.5;margin-bottom:12px;white-space:pre-line}
.result-btn{
  padding:9px 28px;border-radius:10px;font-size:.95rem;font-weight:700;
  cursor:pointer;border:2px solid var(--gold);
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#fff;
  font-family:inherit;transition:all .2s;
}
.result-btn:hover{transform:scale(1.05)}

/* Anubis animation classes */
#anubis-arm-front{transition:transform .5s cubic-bezier(.4,1.5,.5,1);transform-origin:270px 162px}
#anubis-arm-back{transition:transform .5s cubic-bezier(.4,1.5,.5,1);transform-origin:135px 160px}
#anubis-head{transition:transform .4s cubic-bezier(.4,1.5,.5,1);transform-origin:195px 140px}
#anubis-eye{transition:transform .12s;transform-origin:220px 91px}
#scale-beam{transition:transform .7s cubic-bezier(.4,1.5,.5,1)}
#heart-glow{transition:opacity .6s}

/* Devour animation (Ammut + Soul) */
#soul-scene,#ammut-scene{pointer-events:none}
#ammut-jaw-lower{transform-origin:285px 245px}
@keyframes soulSequence{
  0%{opacity:0;transform:translate(-87px,-20px) scale(0.22)}
  20%{opacity:1;transform:translate(-87px,-80px) scale(0.24)}
  40%{opacity:1;transform:translate(-87px,-92px) scale(0.245)}
  58%{opacity:1;transform:translate(-87px,-82px) scale(0.24)}
  72%{opacity:.8;transform:translate(20px,20px) scale(0.16)}
  88%{opacity:.3;transform:translate(100px,120px) scale(0.06)}
  100%{opacity:0;transform:translate(140px,170px) scale(0.01)}
}
@keyframes ammutSequence{
  0%{opacity:0;transform:translate(620px,80px) scale(0.42)}
  28%{opacity:1;transform:translate(130px,80px) scale(0.42)}
  78%{opacity:1;transform:translate(130px,80px) scale(0.42)}
  100%{opacity:0;transform:translate(620px,80px) scale(0.42)}
}
@keyframes jawChomp{
  0%,100%{transform:rotate(0)}
  20%{transform:rotate(15deg)}
  45%{transform:rotate(0)}
  65%{transform:rotate(12deg)}
  85%{transform:rotate(0)}
}
#soul-scene.anim-devour{animation:soulSequence 3s ease both}
#ammut-scene.anim-devour{animation:ammutSequence 2.8s ease .4s both}
#ammut-jaw-lower.anim-chomp{animation:jawChomp .6s ease 2 both}

/* Responsive */
@media (max-width:700px),(max-aspect-ratio:4/3){
  .game-layout{flex-direction:column}
  .left-panel{min-height:36vh;max-height:48vh}
  .right-panel{width:100%;border-left:none;border-top:3px solid var(--gold-deep);max-height:64vh;flex:1}
}
@media (max-height:420px){
  .top-bar{padding:2px 8px;min-height:26px}
  .soul-card{padding:3px 6px}
  .choice-btn{padding:3px 6px}
}
</style>
</head>
<body>
<div id="app">

<div class="top-bar">
  <h1>𓂀 아누비스의 재판 — 진실의 저울</h1>
  <div class="hud">
    <div class="hud-item">𓁟 라운드 <strong id="h-round">1</strong></div>
    <div class="hud-item">𓂋 점수 <strong id="h-score">0</strong></div>
    <div class="hud-item">☥ <strong id="h-lives">♥♥♥</strong></div>
    <div class="hud-item">⏱ <strong id="h-combo">0</strong>콤보</div>
  </div>
</div>

<!-- ==================== START ==================== -->
<div id="start-screen">
  <svg class="start-anubis" viewBox="100 0 220 320" width="180">
    <g id="anubis-start">
      <g><path d="M150 240 L143 310 L120 318 L195 318 L195 240 Z" fill="#1a1410"/><path d="M210 240 L228 310 L210 318 L290 318 L268 310 L262 240 Z" fill="#1a1410"/></g>
      <g><path d="M115 180 L290 180 L310 250 L100 250 Z" fill="#c9a961" stroke="#1a1410" stroke-width="3"/><rect x="115" y="170" width="175" height="16" fill="#a0432a" stroke="#1a1410" stroke-width="3"/></g>
      <g><path d="M130 80 L275 80 L290 180 L115 180 Z" fill="#1a1410"/><path d="M150 92 Q200 120 255 92 L250 120 Q200 142 155 120 Z" fill="#c9a961" stroke="#1a1410" stroke-width="3"/></g>
      <g><path d="M150 35 Q145 15 165 10 Q190 2 215 8 L260 12 Q295 16 305 32 Q307 46 285 50 L255 54 Q252 70 230 82 L170 82 Q142 76 148 52 Z" fill="#1a1410"/><path d="M170 12 L160 -18 L195 8 Z" fill="#1a1410"/><path d="M188 5 L215 -25 L222 10 Z" fill="#1a1410"/><path d="M173 10 L168 -8 L188 5 Z" fill="#a0432a"/><path d="M196 5 L213 -15 L218 8 Z" fill="#a0432a"/><path d="M195 45 Q215 36 240 45 Q225 54 210 52 Z" fill="#efe2c2" stroke="#1a1410" stroke-width="2"/><circle cx="220" cy="46" r="4" fill="#1a1410"/></g>
    </g>
  </svg>
  <h2>진실의 저울</h2>
  <p>
    그대는 재판관 아누비스.<br>
    망자의 심장을 저울에 올리고, 진리의 깃털과 비교하라.<br><br>
    <b>선인</b>이면 심장과 <b>같은 값</b>의 깃털을 골라 <b>수평</b>을 맞춰 구원하고,<br>
    <b>악인</b>이면 심장과 <b>다른 값</b>의 깃털을 골라 저울을 <b>기울여</b> 암무트에게 넘겨라.
  </p>
  <button class="start-btn" onclick="startGame()">재판 시작 ⚖️</button>
</div>

<!-- ==================== GAME ==================== -->
<div id="game-screen">
  <div class="game-layout">

    <!-- LEFT: Scene -->
    <div class="left-panel">
      <div class="soul-card">
        <div class="soul-avatar" id="soul-avatar">👤</div>
        <div class="soul-info">
          <div class="soul-name" id="soul-name">망자</div>
          <div class="soul-record" id="soul-record">생전 기록</div>
          <span class="soul-verdict" id="soul-verdict"></span>
        </div>
      </div>

      <div class="scene-area">
        <div class="heart-frac-overlay">
          <div class="hfo-label">심장의 무게</div>
          <div class="hfo-frac">
            <span class="n" id="hf-num">12</span>
            <div class="bar"></div>
            <span class="d" id="hf-den">18</span>
          </div>
        </div>

        <!-- MAIN SCENE SVG -->
        <svg class="scene-svg" id="scene-svg" viewBox="-480 -100 920 700" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="gFloor" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#3d2b1f" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#1a1410" stop-opacity="0"/>

          <!-- floor shadow -->
          <ellipse cx="0" cy="560" rx="480" ry="40" fill="url(#gFloor)"/>

          <!-- ANUBIS (scaled, left side) -->

              <line x1="230" y1="305" x2="234" y2="395" stroke="#1a1410" stroke-width="2.5"/>

            </g>
            <g id="anubis-head">
              <path d="M165 140 L240 140 L240 165 L165 165 Z" fill="#1a1410"/>
              <path d="M150 80 Q145 55 165 48 Q190 38 215 45 L260 50 Q295 55 305 75 Q307 92 285 98 L255 102 Q252 122 230 138 L170 140 Q142 132 148 100 Z" fill="#1a1410"/>
              <path d="M170 50 L160 12 L195 45 Z" fill="#1a1410"/><path d="M188 42 L215 8 L222 48 Z" fill="#1a1410"/>

            <g id="anubis-arm-back">
              <path d="M125 160 L100 295 L122 300 L145 162 Z" fill="#1a1410"/>
              <ellipse cx="108" cy="305" rx="14" ry="18" fill="#1a1410"/>
              <rect x="93" y="288" width="32" height="12" fill="#c9a961" stroke="#1a1410" stroke-width="3"/>
              <g transform="translate(108,315)">
                <circle cx="0" cy="10" r="11" fill="#c9a961" stroke="#1a1410" stroke-width="4"/>
                <circle cx="0" cy="10" r="5" fill="#f4e4bc" stroke="#1a1410" stroke-width="2.5"/>
                <line x1="0" y1="21" x2="0" y2="55" stroke="#1a1410" stroke-width="4" stroke-linecap="round"/>
                <line x1="-13" y1="35" x2="13" y2="35" stroke="#1a1410" stroke-width="4" stroke-linecap="round"/>
              </g>
            </g>
            <g id="anubis-arm-front">
              <path d="M270 162 L362 188 L370 210 L278 188 Z" fill="#1a1410"/>
              <path d="M362 188 L390 130 L375 122 L350 184 Z" fill="#1a1410"/>
              <path d="M378 130 Q392 120 395 110 Q392 102 384 105 Q378 112 372 124 Z" fill="#1a1410"/>
              <path d="M353 178 L380 132 L390 138 L362 184 Z" fill="#c9a961" stroke="#1a1410" stroke-width="3"/>

/* ============================================================
   MATH
   ============================================================ */
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a}
function isEq(n1,d1,n2,d2){return n1*d2===n2*d1}
function simplify(n,d){const g=gcd(n,d);return[n/g,d/g]}
function randInt(a,b){return a+Math.floor(Math.random()*(b-a+1))}

/* ============================================================
   약분 기반 보기 생성
   - 모든 보기는 심장 분수의 분자·분모 약수 조합으로만 구성
   - 정답: 분자·분모를 같은 수로 나눈 진짜 약분
   - 오답: 분자·분모를 서로 다른 수로 나눈 가짜 약분
   - 5개 보기의 값은 모두 다름 (중복 값 없음)
   ============================================================ */
function getDivisors(n){
  const d=[];
  for(let i=1;i*i<=n;i++){if(n%i===0){d.push(i);if(i!==n/i)d.push(n/i)}}
  return d.sort((a,b)=>a-b);
}

/* 가짜 약분 후보 생성: hN/a ÷ hD/b (a≠b), 진분수만, 값 중복 제거 */
function buildWrongYakbun(hN,hD){
  const dN=getDivisors(hN),dD=getDivisors(hD);
  const pool=[];
  const seen=new Set();
  const[sn,sd]=simplify(hN,hD);
  seen.add(sn+'/'+sd); // 정답 값 제외
  for(const a of dN)for(const b of dD){
    if(a===b)continue; // 같은 수로 나누면 진짜 약분 → 제외
    const fn=hN/a,fd=hD/b;
    if(fn<1||fd<1||fn>=fd)continue; // 진분수만
    if(isEq(fn,fd,hN,hD))continue;
    const[sf,sg]=simplify(fn,fd);
    const k=sf+'/'+sg;
    if(!seen.has(k)){seen.add(k);pool.push({n:fn,d:fd});}
  }
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return pool;
}

function generateHeart(stage){
  const minDen=Math.max(12,10+stage*4);
  const maxDen=Math.min(20+stage*10,100);
  for(let i=0;i<500;i++){
    const d=randInt(minDen,maxDen);
    const n=randInt(Math.max(10,Math.floor(d*0.2)),d-1);
    if(gcd(n,d)<2||n<10||d<10)continue;
    // 가짜 약분 후보가 4개 이상 있어야 보기를 만들 수 있음
    if(buildWrongYakbun(n,d).length>=4) return{n,d};
  }
  return{n:24,d:36};
}

function buildChoices(hN,hD,isGood){
  const[sn,sd]=simplify(hN,hD);
  const eq={n:sn,d:sd}; // 진짜 약분 (정답)
  const wrongs=buildWrongYakbun(hN,hD).slice(0,4);
  const choices=[];
  const correctIdx=randInt(0,4);

  if(isGood){
    // 선인: 정답 1개(진짜 약분) + 오답 4개(가짜 약분)
    let w=0;
    for(let i=0;i<5;i++) choices.push(i===correctIdx?eq:wrongs[w++]);
  } else {
    // 악인: 함정 1개(진짜 약분) + 나머지 4개(가짜 약분, 아무거나 고르면 정답)
    let trapPos;
    do{trapPos=randInt(0,4)}while(trapPos===correctIdx);
    let w=0;
    for(let i=0;i<5;i++){
      if(i===correctIdx) choices.push(wrongs[w++]);
      else if(i===trapPos) choices.push(eq);
      else choices.push(wrongs[w++]);
    }
  }
  return{choices,correctIdx};
}

/* ============================================================
   HEART GRID VISUALIZATION (4x4 = 16 cells)
   ============================================================ */
function setHeartGrid(num,den){
  const fillCount=Math.round((num/den)*16);
  for(let i=0;i<16;i++){
    const r=Math.floor(i/4),c=i%4;
    const cell=document.getElementById(`hc-r${r}c${c}`);
    if(!cell)continue;
    if(i<fillCount){
      cell.setAttribute('fill','#a0432a');cell.setAttribute('opacity','1');
      cell.classList.add('heart-filled');cell.classList.remove('heart-empty');
    } else {
      cell.setAttribute('fill','#6e2d18');cell.setAttribute('opacity','0.35');
      cell.classList.add('heart-empty');cell.classList.remove('heart-filled');
    }
  }
}

function anubisIdle(){
  const af=document.getElementById('anubis-arm-front');
  const ab=document.getElementById('anubis-arm-back');
  const h=document.getElementById('anubis-head');
  if(af)af.style.transform='';
  if(ab)ab.style.transform='';
  if(h)h.style.transform='';
}
function anubisPoint(){
  const af=document.getElementById('anubis-arm-front');
  if(af)af.style.transform='rotate(-22deg)';
}
function anubisNod(){
  const h=document.getElementById('anubis-head');
  if(!h)return;
  h.style.transform='rotate(-8deg)';
  setTimeout(()=>h.style.transform='rotate(4deg)',400);
  setTimeout(()=>h.style.transform='',800);
}
function anubisBlink(){
  const e=document.getElementById('anubis-eye');
  if(!e)return;
  e.style.transform='scaleY(0.05)';
  setTimeout(()=>e.style.transform='',150);
}
function heartGlow(on){
  const g=document.getElementById('heart-glow');
  if(g)g.setAttribute('opacity',on?'1':'0');
}
function showFeatherOnDish(show){
  const f=document.getElementById('feather-on-dish');
  if(f){f.style.transition='opacity .5s';f.setAttribute('opacity',show?'1':'0');}
}

/* ============================================================
   TIMER
   ============================================================ */
function startTimer(){
  G.timeMax=Math.max(12,32-G.round*2);G.timeLeft=G.timeMax;
  updateTimerBar();clearInterval(G.timerInterval);
  G.timerInterval=setInterval(()=>{
    if(G.answered)return;
    G.timeLeft-=0.1;
    if(G.timeLeft<=0){G.timeLeft=0;clearInterval(G.timerInterval);timeOut();}
    updateTimerBar();
  },100);
}
function updateTimerBar(){
  document.getElementById('timer-fill').style.width=Math.max(0,G.timeLeft/G.timeMax*100)+'%';
}
function timeOut(){
  if(G.answered)return;
  G.answered=true;G.combo=0;G.lives--;updateHUD();
  revealAnswer();anubisPoint();
  const[sn,sd]=simplify(G.heartNum,G.heartDen);
  if(G.lives<=0){
    showMsg('fail','⏱ 시간 초과! 생명을 모두 잃었다.');
    setTimeout(gameOver,1000);
  } else {
    showMsg('fail','⏱ 시간 초과! 생명 -1');
    setTimeout(()=>showResult('wrong',
      `정답: ${G.choices[G.correctIdx].n}/${G.choices[G.correctIdx].d} (${G.isGood?'=':'≠'} ${sn}/${sd})`,
      '시간이 다 되었다! 더 빠르게 판단하라.'),600);
  }
}

/* ============================================================
   DEVOUR ANIMATION (Ammut eats the soul)
   ============================================================ */
function playDevourAnimation(callback){
  const soul=document.getElementById('soul-scene');
  const ammut=document.getElementById('ammut-scene');
  const jaw=document.getElementById('ammut-jaw-lower');
  resetDevourActors();
  void soul.offsetWidth;
  soul.classList.add('anim-devour');
  ammut.classList.add('anim-devour');
  setTimeout(()=>{if(jaw)jaw.classList.add('anim-chomp')},1800);
  setTimeout(()=>{resetDevourActors();if(callback)callback()},3400);
}
function resetDevourActors(){
  const s=document.getElementById('soul-scene');
  const a=document.getElementById('ammut-scene');
  const j=document.getElementById('ammut-jaw-lower');
  if(s)s.classList.remove('anim-devour');
  if(a)a.classList.remove('anim-devour');
  if(j)j.classList.remove('anim-chomp');
}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  G.round=1;G.score=0;G.lives=3;G.combo=0;
  updateHUD();newRound();
}

function newRound(){
  G.answered=false;G.selectedIdx=-1;
  anubisIdle();heartGlow(false);showFeatherOnDish(false);
  setBeamAngle(4);resetDevourActors();

  G.isGood=Math.random()<0.5;
  const pool=G.isGood?GOOD_RECORDS:EVIL_RECORDS;
  const soul=pool[randInt(0,pool.length-1)];

  document.getElementById('soul-avatar').textContent=soul.avatar;
  document.getElementById('soul-name').textContent=soul.name;
  document.getElementById('soul-record').textContent='「'+soul.record+'」';
  const vEl=document.getElementById('soul-verdict');
  vEl.textContent=G.isGood?'선인':'악인';
  vEl.className='soul-verdict '+(G.isGood?'verdict-good':'verdict-evil');

  const heart=generateHeart(G.round);
  G.heartNum=heart.n;G.heartDen=heart.d;
  document.getElementById('hf-num').textContent=G.heartNum;
  document.getElementById('hf-den').textContent=G.heartDen;
  setHeartGrid(G.heartNum,G.heartDen);

  const{choices,correctIdx}=buildChoices(G.heartNum,G.heartDen,G.isGood);
  G.choices=choices;G.correctIdx=correctIdx;

  document.getElementById('inst-title').textContent=G.isGood?'⚖️ 선인을 구원하라':'🐊 악인을 처단하라';
  document.getElementById('inst-desc').textContent=G.isGood
    ?`심장(${G.heartNum}/${G.heartDen})과 같은 값의 깃털을 골라라`
    :`심장(${G.heartNum}/${G.heartDen})과 다른 값의 깃털을 골라라`;

  renderChoices();
  document.getElementById('btn-place').disabled=true;
  startTimer();
  showMsg('info',`제 ${G.round} 재판: ${soul.name}의 심장을 저울에 올렸다.`);
  setTimeout(anubisBlink,600);
}

function renderChoices(){
  const c=document.getElementById('choices');c.innerHTML='';
  // shuffle feather colors then assign
  G.choiceColors=[...FCOLORS].sort(()=>Math.random()-.5);
  G.choices.forEach((ch,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.dataset.idx=i;
    btn.innerHTML=`
      ${featherSVG(G.choiceColors[i%5],'')}
      <div class="choice-frac-col">
        <span class="cf-num">${ch.n}</span>
        <div class="cf-bar"></div>
        <span class="cf-den">${ch.d}</span>
      </div>`;
    btn.onclick=()=>selectChoice(i);
    c.appendChild(btn);
  });
}

function selectChoice(i){
  if(G.answered)return;
  G.selectedIdx=i;
  document.querySelectorAll('.choice-btn').forEach((b,j)=>b.classList.toggle('selected',j===i));
  document.getElementById('btn-place').disabled=false;
}

function onPlace(){
  if(G.answered||G.selectedIdx<0)return;
  G.answered=true;clearInterval(G.timerInterval);

  const sel=G.selectedIdx,chosen=G.choices[sel];
  const eq=isEq(chosen.n,chosen.d,G.heartNum,G.heartDen);
  const correct=G.isGood?eq:!eq;
  const btns=document.querySelectorAll('.choice-btn');

  // Update feather-on-dish color to match selected feather
  const selColor=G.choiceColors[sel%5];
  const fod=document.querySelector('#feather-on-dish path');
  if(fod) fod.setAttribute('fill',selColor.fill);

  // ---- FLY ANIMATION: selected feather flies to dish ----
  const selBtn=btns[sel];
  const btnRect=selBtn.getBoundingClientRect();
  // target: approximate position of right dish in viewport
  const sceneSvg=document.getElementById('scene-svg');
  const svgRect=sceneSvg.getBoundingClientRect();
  // dish-right is roughly at 72% x, 30% y of the scene SVG
  const targetX=svgRect.left+svgRect.width*0.62;
  const targetY=svgRect.top+svgRect.height*0.25;

  // Clone the button for flying
  const flyClone=selBtn.cloneNode(true);
  flyClone.className='choice-btn flying';
  flyClone.style.left=btnRect.left+'px';
  flyClone.style.top=btnRect.top+'px';
  flyClone.style.width=btnRect.width+'px';
  flyClone.style.height=btnRect.height+'px';
  flyClone.style.margin='0';
  document.body.appendChild(flyClone);

  // Hide original
  selBtn.style.opacity='0';

  // Trigger fly
  requestAnimationFrame(()=>{
    flyClone.style.left=targetX+'px';
    flyClone.style.top=targetY+'px';
    flyClone.style.width='40px';
    flyClone.style.height='40px';
    flyClone.style.opacity='0.6';
    flyClone.style.borderRadius='50%';
  });

  // After fly animation completes
  setTimeout(()=>{
    flyClone.remove();
    showFeatherOnDish(true);

    // Animate scale
    const targetAngle=eq?0:(chosen.n/chosen.d>G.heartNum/G.heartDen?12:-12);
    let curAngle=4;const step=(targetAngle-curAngle)/20;let frame=0;
    const anim=()=>{
      frame++;curAngle+=step;
      if(frame>=20)curAngle=targetAngle;
      setBeamAngle(curAngle);
      if(frame<20)requestAnimationFrame(anim);
    };
    requestAnimationFrame(anim);

    // Mark buttons
    btns.forEach((b,j)=>{
      b.disabled=true;b.style.opacity='';
      if(j===G.correctIdx)b.classList.add('correct');
      if(j===sel&&!correct)b.classList.add('wrong');
    });

    if(correct){
      G.combo++;
      const earned=100+Math.round(G.timeLeft*3)+G.combo*15+G.round*10;
      G.score+=earned;
      anubisNod();heartGlow(G.isGood);
      if(G.isGood){
        showMsg('success',`✨ 수평! ${chosen.n}/${chosen.d} = ${G.heartNum}/${G.heartDen}  +${earned}점`);
        setTimeout(()=>showResult('heaven',
          `${chosen.n}/${chosen.d}은(는) ${G.heartNum}/${G.heartDen}과 같은 값!`,
          `영혼이 오시리스의 왕국으로 들어간다.`),700);
      } else {
        showMsg('success',`🐊 기울어짐! ${chosen.n}/${chosen.d} ≠ ${G.heartNum}/${G.heartDen}  +${earned}점`);
        setTimeout(()=>playDevourAnimation(()=>showResult('devour',
          `${chosen.n}/${chosen.d}은(는) ${G.heartNum}/${G.heartDen}과 다른 값!`,
          `악인의 심장은 암무트에게 넘겨졌다.`)),700);
      }
    } else {
      G.combo=0;G.lives--;G.score=Math.max(0,G.score-50);
      anubisPoint();
      showMsg('fail','❌ 잘못된 판정! 생명 -1, -50점');
      const[sn,sd]=simplify(G.heartNum,G.heartDen);
      setTimeout(()=>showResult('wrong',
        `정답: ${G.choices[G.correctIdx].n}/${G.choices[G.correctIdx].d} (${G.isGood?'=':'≠'} ${sn}/${sd})`,
        G.isGood?'선인을 잘못 처단하였다!':'악인을 놓쳐버렸다!'),700);
    }
    updateHUD();
    if(G.lives<=0)setTimeout(gameOver,1600);
  },750);
}

function revealAnswer(){
  document.querySelectorAll('.choice-btn').forEach((b,j)=>{
    b.disabled=true;if(j===G.correctIdx)b.classList.add('correct');
  });
}

function showResult(type,title,desc){
  const overlay=document.getElementById('result-overlay');
  const card=document.getElementById('result-card');
  overlay.classList.add('show');
  card.className='result-card';
  let icon='';
  if(type==='heaven'){card.classList.add('result-heaven');icon='🌅';}
  else if(type==='devour'){card.classList.add('result-devour');icon='🐊';}
  else{card.classList.add('result-wrong');icon='💀';}
  document.getElementById('res-icon').textContent=icon;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-desc').textContent=desc;
}

function closeResult(){document.getElementById('result-overlay').classList.remove('show')}

function onResultContinue(){
  closeResult();
  if(G.lives<=0){
    document.getElementById('game-screen').style.display='none';
    document.getElementById('start-screen').style.display='flex';
    return;
  }
  G.round++;updateHUD();newRound();
}

function gameOver(){
  clearInterval(G.timerInterval);
  showResult('wrong','재판 종료',`그대의 심판은 끝났다.\n최종 점수: ${G.score}점 | 라운드: ${G.round}`);
}

function updateHUD(){
  document.getElementById('h-round').textContent=G.round;
  document.getElementById('h-score').textContent=G.score;
  document.getElementById('h-lives').textContent='♥'.repeat(Math.max(0,G.lives))+'♡'.repeat(Math.max(0,3-G.lives));
  document.getElementById('h-combo').textContent=G.combo;
}

function showMsg(type,text){
  const box=document.getElementById('msg-box');
  box.className='msg-box m-'+type;box.textContent=text;
  box.style.animation='none';box.offsetHeight;box.style.animation='';
}
